[tool.pytest.ini_options]
asyncio_mode = "auto"          # all async test functions run automatically
testpaths    = ["tests"]
addopts      = "-v --tb=short"  # verbose output, short tracebacks

[tool.ruff]
line-length    = 100
target-version = "py311"

[tool.ruff.lint]
# E/W = pycodestyle  F = pyflakes  I = isort  UP = pyupgrade
select = ["E", "W", "F", "I", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
